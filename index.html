<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akku Electronics - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <!-- Top Bar -->
        <div class="header__topbar">
            <div class="container">
                <div class="header__topbar-left">
                    <span><i class="fas fa-phone"></i> +977-1234567890</span>
                    <span><i class="fas fa-envelope"></i> info@akkuelectronics.com</span>
                </div>
                <div class="header__topbar-right">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>

        <!-- Main Header -->
        <div class="header__main">
            <div class="container">
                <a href="index.html" class="header__logo">
                    <i class="fas fa-bolt"></i> AKKU
                </a>

                <!-- Search Bar -->
                <div class="header__search">
                    <input type="text" placeholder="Search for products...">
                    <button><i class="fas fa-search"></i></button>
                </div>

                <!-- Header Actions -->
                <div class="header__actions">
                    <a href="#" class="header__action-item">
                        <i class="fas fa-user"></i>
                        <span>Account</span>
                    </a>
                    <a href="#" class="header__action-item">
                        <i class="fas fa-heart"></i>
                        <span>Wishlist</span>
                        <span class="badge">3</span>
                    </a>
                    <a href="#" class="header__action-item">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Cart</span>
                        <span class="badge">5</span>
                    </a>
                </div>

                <!-- Mobile Menu Toggle -->
                <button class="header__menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <!-- Mobile Search -->
        <div class="header__mobile-search">
            <input type="text" placeholder="Search for products...">
        </div>

        <!-- Navigation -->
        <nav class="header__nav" id="mainNav">
            <div class="container">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="#">Categories</a></li>
                    <li><a href="#">Deals</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="home__hero">
            <div class="container">
                <h1>Welcome to Akku Electronics</h1>
                <p>Your one-stop shop for all electronic needs</p>
                <a href="products.html" class="btn">Shop Now</a>
            </div>
        </section>

        <section class="home__products">
            <div class="container">
                <h2>Featured Products</h2>
                <div class="product-grid">
                    <!-- Product items would go here -->
                    <p>Product items will be displayed here...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Mobile menu toggle
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('mainNav').classList.toggle('active');
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });
    </script>
</body>
</html>
